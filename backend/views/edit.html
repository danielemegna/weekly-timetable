<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Modifica Turno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/normalize.min.css">
  <style>
    body {
      background-image: url("/img/background.jpeg");
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: large;
      padding: 1.2em;
    }

    h1 {
      text-decoration: underline;
      font-family: "Chewy", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 2.6em;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background-color: #fff6da;
      box-shadow: 5px 10px 8px #888888;

      th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
      th { background-color: #ffe79b; }
      td:nth-child(2) { text-align: center; width: 1%; padding:0; }
    }

    h4 { margin-top: 1.2em; margin-bottom: 0.5em; }

    input[name="name"] {
      width: 100%;
      box-sizing: border-box;
    }

    #addButton {
      margin-top: 0.6em;
      float: right;
    }

    #deleteButton {
      all: unset;
      display: block;
      cursor: pointer;
      height: 2em;
      width: 2em;
    }
  </style>
</head>
<body>
  <h1>Modifica turno</h1>

  <form method="post">
    <table>
      <tr>
        <th>Nome</th>
        <th></th>
      </tr>
      {{#each names}}
      <tr>
        <td>{{this}}</td>
        <td>
          <button id="deleteButton" type="submit" name="name" value="{{this}}">❌</button>
        </td>
      </tr>
      {{/each}}
    </table>
    <input type="hidden" name="action" value="delete" />
  </form>

  <form method="post">
    <h4>Aggiungi:</h4>
    <input name="name" type="text" />
    <button id="addButton" type="submit" name="action" value="add">Aggiungi</button>
  </form>

</body>
</html>
