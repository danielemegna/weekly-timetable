<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <meta name="theme-color" content="#fff6da">
  <title>Note Settimanali</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/normalize.min.css">
  <style>
    body {
      background-image: url("/img/background.jpeg");
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: large;
      padding: 1.2em;
    }

    h1 {
      text-decoration: underline;
      font-family: "Chewy", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 2.6em;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      min-height: 15em;
      font-size: 1em;
      padding: 0.5em;
      border: 1px solid #e6c85c;
      background-color: #fff6da;
    }

    form { overflow: hidden; }

    #saveButton, #closeButton {
      margin-top: 0.6em;
      float: right;
      border-radius: 8px;
      padding: 6px 18px;
      box-shadow: 2px 3px 4px rgba(0,0,0,0.15);
    }

    #saveButton { background-color: #ffe79b; border: 1px solid #e6c85c; }
    #closeButton { background-color: #f6f6f6; border: 1px solid #c2c1bd; }
  </style>
</head>
<body>
  <h1>Note settimanali</h1>

  <form method="post">
    <textarea name="notes">{{{notes}}}</textarea>
    <button id="saveButton" type="submit">Salva</button>
  </form>

  <button id="closeButton" onclick="window.location.href='/?editor=federica&weekNumber={{weekNumber}}'">Chiudi</button>
</body>
</html>
