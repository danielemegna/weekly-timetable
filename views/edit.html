<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <meta name="theme-color" content="#fff6da">
  <title>Modifica Turno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chewy&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/normalize.min.css">
  <style>
    body {
      background-image: url("/img/background.jpeg");
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: large;
      padding: 1.2em;
    }

    h1 {
      text-decoration: underline;
      font-family: "Chewy", system-ui;
      font-weight: 400;
      font-style: normal;
      font-size: 2.6em;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background-color: #fff6da;
      box-shadow: 5px 10px 8px #888888;

      th, td { border: 1px solid #e6c85c; padding: 8px; text-align: left; }
      th { background-color: #ffe79b; }
      td:nth-child(2) { text-align: center; width: 1%; padding:0; }
    }

    h4 { margin-top: 1.2em; margin-bottom: 0.5em; }

    form { overflow: hidden; }

    input[name="name"] {
      width: 100%;
      box-sizing: border-box;
    }

    #addButton, #closeButton {
      margin-top: 0.6em;
      float: right;
      border-radius: 8px;
      padding: 6px 18px;
      box-shadow: 2px 3px 4px rgba(0,0,0,0.15);
    }

    #addButton { background-color: #ffe79b; border: 1px solid #e6c85c; }
    #closeButton { background-color: #f6f6f6; border: 1px solid #c2c1bd; }

    #deleteButton {
      all: unset;
      display: block;
      cursor: pointer;
      height: 2em;
      width: 2em;
    }
  </style>
</head>
<body>
  <h1>Modifica turno</h1>

  <form method="post">
    <table>
      <tr>
        <th>Nome</th>
        <th></th>
      </tr>
      {{#each names}}
      <tr>
        <td>{{this}}</td>
        <td>
          <button
            id="deleteButton"
            onclick="return confirm('Sicura di voler eliminare?')"
            type="submit"
            name="name"
            value="{{this}}"
          >❌</button>
        </td>
      </tr>
      {{/each}}
    </table>
    <input type="hidden" name="action" value="delete" />
  </form>

  <form method="post">
    <h4>Aggiungi:</h4>
    <input id="addName" name="name" type="text" />
    <button
      id="addButton"
      onclick="return document.getElementById('addName').value != ''"
      type="submit"
      name="action"
      value="add"
    >Aggiungi</button>
  </form>

  <button id="closeButton" onclick="window.location.href='/?editor=federica'">Chiudi</button>

</body>
</html>
